<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ngày Mới - PowerPoint Video</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      overflow: hidden;
      background: #000;
      width: 100vw;
      height: 100vh;
    }

    #root { width: 100%; height: 100%; }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none;
    }
    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    @keyframes floatSlow {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(60px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-60px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(80px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-80px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes rotateIn {
      from { opacity: 0; transform: rotate(-10deg) scale(0.8); }
      to { opacity: 1; transform: rotate(0deg) scale(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes ray {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes wave {
      0%, 100% { d: path("M0,160 C320,300 420,50 640,160 C880,280 960,80 1280,160 L1280,800 L0,800 Z"); }
      50% { d: path("M0,200 C320,80 420,320 640,200 C880,60 960,300 1280,200 L1280,800 L0,800 Z"); }
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #FF6B35, #FFC857, #FF6B35);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      z-index: 100;
      transition: width 0.3s ease;
    }

    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      border-radius: 30px;
    }
    .controls button {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .controls button:hover { background: rgba(255,255,255,0.15); }
    .controls button.play-btn { font-size: 16px; }
    .slide-counter {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 300;
      min-width: 50px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const SLIDE_DURATION = 5000;

    function Particles({ count = 30, colors }) {
      const particles = useMemo(() =>
        Array.from({ length: count }, (_, i) => ({
          id: i,
          x: Math.random() * 100,
          y: Math.random() * 100,
          size: Math.random() * 6 + 2,
          dur: Math.random() * 4 + 3,
          delay: Math.random() * 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          opacity: Math.random() * 0.4 + 0.1,
        })),
        [count, colors.join(',')]
      );
      return particles.map(p => (
        <div
          key={p.id}
          className="particle"
          style={{
            left: `${p.x}%`,
            top: `${p.y}%`,
            width: p.size,
            height: p.size,
            background: p.color,
            opacity: p.opacity,
            animation: `float ${p.dur}s ease-in-out ${p.delay}s infinite`,
          }}
        />
      ));
    }

    function SunRays() {
      return (
        <div style={{
          position: 'absolute',
          width: 400,
          height: 400,
          top: '50%',
          left: '50%',
          marginTop: -200,
          marginLeft: -200,
          animation: 'ray 30s linear infinite',
          opacity: 0.3,
        }}>
          {Array.from({ length: 12 }, (_, i) => (
            <div key={i} style={{
              position: 'absolute',
              top: '50%',
              left: '50%',
              width: 3,
              height: 200,
              background: 'linear-gradient(to bottom, #FFC857, transparent)',
              transformOrigin: 'top center',
              transform: `rotate(${i * 30}deg)`,
            }} />
          ))}
        </div>
      );
    }

    function MountainSilhouette({ color = "#1a1a2e" }) {
      return (
        <svg viewBox="0 0 1280 400" style={{ position: 'absolute', bottom: 0, width: '100%' }}>
          <path d="M0,400 L0,280 L120,180 L200,220 L350,120 L450,200 L550,80 L650,160 L750,100 L850,180 L950,60 L1050,150 L1150,100 L1200,140 L1280,120 L1280,400 Z" fill={color} opacity="0.7"/>
          <path d="M0,400 L0,320 L150,240 L300,280 L400,200 L500,260 L650,180 L800,230 L900,160 L1000,210 L1100,180 L1280,220 L1280,400 Z" fill={color} opacity="0.5"/>
        </svg>
      );
    }

    const slides = [
      // Slide 1: Title
      {
        id: 1,
        bg: 'linear-gradient(135deg, #0f0c29, #302b63, #24243e)',
        render: (active) => (
          <div style={{ textAlign: 'center', position: 'relative', zIndex: 2 }}>
            <Particles count={40} colors={['#FFC857', '#FF6B35', '#FFF3E0']} />
            <div style={{
              fontSize: 140,
              animation: active ? 'scaleIn 1s ease forwards' : 'none',
              opacity: active ? undefined : 0,
              marginBottom: 20,
            }}>
              🌅
            </div>
            <h1 style={{
              fontSize: 72,
              fontWeight: 900,
              background: 'linear-gradient(90deg, #FFC857, #FF6B35, #FFC857)',
              backgroundSize: '200% auto',
              WebkitBackgroundClip: 'text',
              WebkitTextFillColor: 'transparent',
              animation: active ? 'slideUp 0.8s ease 0.3s both, shimmer 3s linear infinite' : 'none',
              letterSpacing: 4,
            }}>
              NGÀY MỚI
            </h1>
            <p style={{
              fontSize: 22,
              color: 'rgba(255,255,255,0.6)',
              fontWeight: 300,
              marginTop: 16,
              letterSpacing: 8,
              animation: active ? 'slideUp 0.8s ease 0.6s both' : 'none',
            }}>
              MỖI BÌNH MINH LÀ MỘT KHẢ NĂNG MỚI
            </p>
          </div>
        ),
      },
      // Slide 2: Năng lượng tích cực
      {
        id: 2,
        bg: 'linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d)',
        render: (active) => (
          <div style={{ textAlign: 'center', position: 'relative', zIndex: 2, width: '100%' }}>
            <Particles count={25} colors={['#fdbb2d', '#fff', '#f9d423']} />
            <SunRays />
            <div style={{
              position: 'absolute',
              width: 200,
              height: 200,
              borderRadius: '50%',
              background: 'radial-gradient(circle, #FFC857, #FF6B35, transparent)',
              top: '15%',
              left: '50%',
              marginLeft: -100,
              animation: active ? 'pulse 3s ease-in-out infinite' : 'none',
              opacity: active ? undefined : 0,
            }} />
            <div style={{
              position: 'relative',
              marginTop: 300,
              animation: active ? 'slideUp 0.8s ease 0.3s both' : 'none',
            }}>
              <h2 style={{
                fontSize: 52,
                fontWeight: 700,
                color: '#fff',
                textShadow: '0 4px 30px rgba(0,0,0,0.3)',
              }}>
                ☀️ Năng Lượng Tích Cực
              </h2>
              <p style={{
                fontSize: 26,
                color: 'rgba(255,255,255,0.85)',
                maxWidth: 700,
                margin: '20px auto 0',
                lineHeight: 1.8,
                fontWeight: 300,
              }}>
                "Hôm nay là một ngày tuyệt vời để bắt đầu<br/>
                những điều tốt đẹp hơn"
              </p>
            </div>
          </div>
        ),
      },
      // Slide 3: Lời chúc buổi sáng
      {
        id: 3,
        bg: 'linear-gradient(135deg, #667eea, #764ba2)',
        render: (active) => (
          <div style={{ textAlign: 'center', position: 'relative', zIndex: 2 }}>
            <Particles count={35} colors={['#fff', '#e0c3fc', '#8ec5fc']} />
            <div style={{
              background: 'rgba(255,255,255,0.08)',
              backdropFilter: 'blur(20px)',
              borderRadius: 30,
              padding: '50px 70px',
              border: '1px solid rgba(255,255,255,0.15)',
              animation: active ? 'rotateIn 0.8s ease 0.2s both' : 'none',
              boxShadow: '0 20px 60px rgba(0,0,0,0.2)',
            }}>
              <div style={{ fontSize: 60, marginBottom: 16 }}>🌸</div>
              <h2 style={{
                fontSize: 44,
                fontWeight: 700,
                color: '#fff',
                marginBottom: 24,
              }}>
                Chúc Bạn Một Ngày Tươi Đẹp
              </h2>
              <div style={{
                width: 80,
                height: 3,
                background: 'linear-gradient(90deg, #FFC857, #FF6B35)',
                margin: '0 auto 24px',
                borderRadius: 2,
              }} />
              <p style={{
                fontSize: 22,
                color: 'rgba(255,255,255,0.8)',
                lineHeight: 2,
                fontWeight: 300,
              }}>
                Ngắm hoàng hôn, hít thở gió mát<br/>
                Cười thật tươi, tận hưởng ngày mới
              </p>
            </div>
          </div>
        ),
      },
      // Slide 4: Động lực
      {
        id: 4,
        bg: 'linear-gradient(135deg, #0d9488, #065f46)',
        render: (active) => (
          <div style={{ position: 'relative', zIndex: 2, width: '100%' }}>
            <Particles count={20} colors={['#a7f3d0', '#34d399', '#fff']} />
            <div style={{ display: 'flex', gap: 30, justifyContent: 'center', flexWrap: 'wrap', padding: '0 60px' }}>
              {[
                { icon: '🎯', title: 'Mục Tiêu', text: 'Đặt mục tiêu rõ ràng cho ngày mới', delay: 0.2 },
                { icon: '💪', title: 'Quyết Tâm', text: 'Không gì có thể ngăn cản bạn', delay: 0.4 },
                { icon: '🌟', title: 'Tin Tưởng', text: 'Bạn có thể làm được điều tuyệt vời', delay: 0.6 },
              ].map((item, i) => (
                <div key={i} style={{
                  background: 'rgba(255,255,255,0.08)',
                  backdropFilter: 'blur(15px)',
                  borderRadius: 24,
                  padding: '40px 30px',
                  width: 280,
                  textAlign: 'center',
                  border: '1px solid rgba(255,255,255,0.1)',
                  animation: active ? `slideUp 0.6s ease ${item.delay}s both` : 'none',
                  transition: 'transform 0.3s ease',
                }}>
                  <div style={{ fontSize: 50, marginBottom: 16 }}>{item.icon}</div>
                  <h3 style={{ fontSize: 24, fontWeight: 700, color: '#a7f3d0', marginBottom: 10 }}>{item.title}</h3>
                  <p style={{ fontSize: 16, color: 'rgba(255,255,255,0.7)', lineHeight: 1.6 }}>{item.text}</p>
                </div>
              ))}
            </div>
            <h2 style={{
              textAlign: 'center',
              fontSize: 40,
              fontWeight: 700,
              color: '#a7f3d0',
              marginTop: 50,
              animation: active ? 'fadeIn 1s ease 0.8s both' : 'none',
            }}>
              🔥 BẮT ĐẦU NGAY HÔM NAY
            </h2>
          </div>
        ),
      },
      // Slide 5: Bình minh
      {
        id: 5,
        bg: 'linear-gradient(180deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #e94560 100%)',
        render: (active) => (
          <div style={{ position: 'relative', zIndex: 2, width: '100%', height: '100%' }}>
            <Particles count={15} colors={['#ffd700', '#ff8c00', '#fff']} />
            <div style={{
              position: 'absolute',
              width: 300,
              height: 300,
              borderRadius: '50%',
              background: 'radial-gradient(circle, #FFC857 0%, #FF6B35 40%, transparent 70%)',
              bottom: '30%',
              left: '50%',
              marginLeft: -150,
              animation: active ? 'pulse 4s ease-in-out infinite' : 'none',
              boxShadow: '0 0 120px 40px rgba(255,200,87,0.3)',
            }} />
            <svg viewBox="0 0 1280 300" style={{ position: 'absolute', bottom: 0, width: '100%' }}>
              <path d="M0,300 L0,180 L200,120 L400,160 L600,80 L800,140 L1000,100 L1200,130 L1280,110 L1280,300 Z" fill="#0a0a1a" opacity="0.6"/>
              <path d="M0,300 L0,220 L150,180 L350,210 L500,150 L700,190 L900,140 L1100,170 L1280,150 L1280,300 Z" fill="#0a0a1a" opacity="0.4"/>
            </svg>
            <div style={{
              position: 'absolute',
              bottom: '15%',
              left: '50%',
              transform: 'translateX(-50%)',
              textAlign: 'center',
              animation: active ? 'slideUp 1s ease 0.5s both' : 'none',
            }}>
              <h2 style={{
                fontSize: 48,
                fontWeight: 900,
                color: '#FFC857',
                textShadow: '0 0 40px rgba(255,200,87,0.5)',
              }}>
                Mỗi Bình Minhlà Một Bắt Đầu Mới
              </h2>
              <p style={{
                fontSize: 20,
                color: 'rgba(255,255,255,0.6)',
                marginTop: 16,
                fontWeight: 300,
              }}>
                Đừng nhìn lại quá khứ, hãy hướng tới tương lai
              </p>
            </div>
          </div>
        ),
      },
      // Slide 6: Cảm ơn
      {
        id: 6,
        bg: 'linear-gradient(135deg, #0f0c29, #302b63, #24243e)',
        render: (active) => (
          <div style={{ textAlign: 'center', position: 'relative', zIndex: 2 }}>
            <Particles count={50} colors={['#FFC857', '#FF6B35', '#fff', '#e0c3fc']} />
            <div style={{
              animation: active ? 'scaleIn 1s ease 0.2s both' : 'none',
            }}>
              <div style={{ fontSize: 80, marginBottom: 20 }}>✨</div>
              <h1 style={{
                fontSize: 64,
                fontWeight: 900,
                background: 'linear-gradient(90deg, #FFC857, #FF6B35, #e0c3fc, #FFC857)',
                backgroundSize: '300% auto',
                WebkitBackgroundClip: 'text',
                WebkitTextFillColor: 'transparent',
                animation: active ? 'shimmer 4s linear infinite' : 'none',
              }}>
                Cảm Ơn Bạn
              </h1>
              <p style={{
                fontSize: 24,
                color: 'rgba(255,255,255,0.5)',
                marginTop: 20,
                fontWeight: 300,
                letterSpacing: 4,
              }}>
                CHÚC BẠN MỘT NGÀY TUYỆT VỜI ❤️
              </p>
              <div style={{
                marginTop: 40,
                display: 'flex',
                gap: 16,
                justifyContent: 'center',
              }}>
                {['🌅', '☀️', '🌸', '💪', '🎯'].map((e, i) => (
                  <span key={i} style={{
                    fontSize: 36,
                    animation: active ? `float ${2 + i * 0.3}s ease-in-out ${i * 0.2}s infinite` : 'none',
                  }}>
                    {e}
                  </span>
                ))}
              </div>
            </div>
          </div>
        ),
      },
    ];

    function App() {
      const [current, setCurrent] = useState(0);
      const [playing, setPlaying] = useState(true);
      const [progress, setProgress] = useState(0);
      const total = slides.length;

      const goTo = useCallback((i) => {
        setCurrent(((i % total) + total) % total);
        setProgress(0);
      }, [total]);

      const next = useCallback(() => goTo(current + 1), [current, goTo]);
      const prev = useCallback(() => goTo(current - 1), [current, goTo]);
      const togglePlay = useCallback(() => setPlaying(p => !p), []);

      useEffect(() => {
        if (!playing) return;
        const interval = setInterval(() => {
          setProgress(p => {
            if (p >= 100) {
              setCurrent(c => (c + 1) % total);
              return 0;
            }
            return p + (100 / (SLIDE_DURATION / 50));
          });
        }, 50);
        return () => clearInterval(interval);
      }, [playing, total]);

      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
          if (e.key === 'p') togglePlay();
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [next, prev, togglePlay]);

      return (
        <div style={{ width: '100vw', height: '100vh', position: 'relative', overflow: 'hidden' }}>
          <div className="progress-bar" style={{ width: `${((current + 1) / total) * 100}%` }} />
          <div className="progress-bar" style={{
            width: `${(current / total) * 100 + (progress / total)}%`,
            top: 3,
            opacity: 0.5,
          }} />

          {slides.map((slide, i) => (
            <div
              key={slide.id}
              className={`slide ${i === current ? 'active' : ''}`}
              style={{
                background: slide.bg,
              }}
            >
              {slide.render(i === current)}
            </div>
          ))}

          <div className="controls">
            <button onClick={prev} title="Trước">◀</button>
            <button className="play-btn" onClick={togglePlay} title={playing ? 'Tạm dừng' : 'Phát'}>
              {playing ? '⏸' : '▶'}
            </button>
            <button onClick={next} title="Sau">▶</button>
            <span className="slide-counter">{current + 1} / {total}</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
